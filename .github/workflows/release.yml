name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/apf

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - name: Parse version from tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      matrix:
        service:
          - orchestrator
          - agent-runner
          - artifact-store
          - github-integration
          - slack-connector
          - jira-connector
          - confluence-connector
          - aws-connector
          - dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ needs.validate-tag.outputs.is_prerelease == 'false' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            VERSION=${{ needs.validate-tag.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  publish-cli:
    name: Publish apf-cli to PyPI
    runs-on: ubuntu-latest
    needs: validate-tag
    environment:
      name: pypi
      url: https://pypi.org/project/apf-cli/
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --package apf-cli --frozen

      - name: Build CLI package
        working-directory: cli
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          skip-existing: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-and-push-images, publish-cli]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract CHANGELOG excerpt
        id: changelog
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d' | head -100)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to handle multi-line output safely
          echo "$NOTES" > release_notes.txt
          echo "notes_file=release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Generate image digest summary
        run: |
          echo "## Docker Images" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "All images are published to GitHub Container Registry:" >> release_notes.txt
          echo "" >> release_notes.txt
          for svc in orchestrator agent-runner artifact-store github-integration slack-connector jira-connector confluence-connector aws-connector dashboard; do
            echo "- \`${{ env.IMAGE_PREFIX }}-${svc}:${{ needs.validate-tag.outputs.version }}\`" >> release_notes.txt
          done
          echo "" >> release_notes.txt
          echo "## CLI" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "\`\`\`" >> release_notes.txt
          echo "pip install apf-cli==${{ needs.validate-tag.outputs.version }}" >> release_notes.txt
          echo "\`\`\`" >> release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "APF ${{ github.ref_name }}"
          body_path: release_notes.txt
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          make_latest: ${{ needs.validate-tag.outputs.is_prerelease == 'false' }}
