name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: ~/.cache/uv
  PNPM_VERSION: "9.0.0"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: |
          uv run mypy packages/agent-core/src \
            packages/db/src \
            packages/event-bus/src \
            services/orchestrator/src \
            services/agent-runner/src \
            services/artifact-store/src \
            services/github-integration/src \
            services/slack-connector/src \
            services/jira-connector/src \
            services/confluence-connector/src \
            services/aws-connector/src \
            cli/src \
            --ignore-missing-imports

  test-python:
    name: Test Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen --extra test

      - name: Run pytest with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          APF_SECRET_KEY: "test-secret-key-for-ci-only"
          APF_JWT_ALGORITHM: "HS256"
          APF_JWT_EXPIRE_MINUTES: "60"
          LLM_PROVIDER: "anthropic"
          LLM_MODEL: "claude-opus-4-6"
          ANTHROPIC_API_KEY: "test-key"
          LOG_LEVEL: "WARNING"
        run: |
          uv run pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --tb=short \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: services/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm prettier --check "src/**/*.{ts,tsx,css}"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: services/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test --run --reporter=verbose --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: services/dashboard/coverage/
          retention-days: 14

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp deploy/.env.example deploy/.env

      - name: Build all images
        working-directory: deploy
        run: |
          docker compose build \
            --parallel \
            --no-cache \
            orchestrator \
            agent-runner \
            artifact-store \
            dashboard
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, lint-frontend, test-frontend, build-docker]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-python.result }}" != "success" ]]; then
            echo "lint-python failed"
            exit 1
          fi
          if [[ "${{ needs.test-python.result }}" != "success" ]]; then
            echo "test-python failed"
            exit 1
          fi
          if [[ "${{ needs.lint-frontend.result }}" != "success" ]]; then
            echo "lint-frontend failed"
            exit 1
          fi
          if [[ "${{ needs.test-frontend.result }}" != "success" ]]; then
            echo "test-frontend failed"
            exit 1
          fi
          if [[ "${{ needs.build-docker.result }}" != "success" ]]; then
            echo "build-docker failed"
            exit 1
          fi
          echo "All checks passed!"
