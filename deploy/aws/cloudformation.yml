AWSTemplateFormatVersion: "2010-09-09"
Description: >
  APF — Autonomous Product Factory
  ECS Fargate deployment with ALB, RDS PostgreSQL, ElastiCache Redis, and EFS for artifacts.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  StackName:
    Type: String
    Default: apf
    Description: Prefix for all resource names

  EcrRegistry:
    Type: String
    Description: ECR registry URI (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com)

  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

  VpcCIDR:
    Type: String
    Default: "10.0.0.0/16"

  DesiredOrchestratorCount:
    Type: Number
    Default: 1

  DesiredAgentRunnerCount:
    Type: Number
    Default: 2

  OrchestratorCpu:
    Type: Number
    Default: 512

  OrchestratorMemory:
    Type: Number
    Default: 1024

  AgentRunnerCpu:
    Type: Number
    Default: 1024

  AgentRunnerMemory:
    Type: Number
    Default: 2048

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC + Networking
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-vpc"

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-public-b"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.10.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-private-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.11.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-private-b"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  NatEipA:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId
      SubnetId: !Ref PublicSubnetA

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGatewayA

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # Security Groups
  # ---------------------------------------------------------------------------
  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP/HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"

  AppSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — allow from ALB and within VPC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8010
          SourceSecurityGroupId: !Ref AlbSG
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8010
          CidrIp: "10.0.0.0/16"

  DataSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS + ElastiCache — allow from app layer only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSG
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref AppSG

  # ---------------------------------------------------------------------------
  # RDS PostgreSQL
  # ---------------------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: APF RDS subnet group
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${StackName}-postgres"
      DBName: apf
      Engine: postgres
      EngineVersion: "15"
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: "20"
      StorageType: gp3
      MasterUsername: apf
      ManageMasterUserPassword: true
      VPCSecurityGroups:
        - !Ref DataSG
      DBSubnetGroupName: !Ref DBSubnetGroup
      MultiAZ: false
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-postgres"

  # ---------------------------------------------------------------------------
  # ElastiCache Redis
  # ---------------------------------------------------------------------------
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: APF Redis subnet group
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub "${StackName}-redis"
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: cache.t4g.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DataSG

  # ---------------------------------------------------------------------------
  # EFS (artifact storage)
  # ---------------------------------------------------------------------------
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub "${StackName}-artifacts"

  EFSMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetA
      SecurityGroups:
        - !Ref AppSG

  EFSMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref AppSG

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${StackName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref AlbSG

  OrchestratorTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${StackName}-orchestrator"
      Protocol: HTTP
      Port: 8000
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  DashboardTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${StackName}-dashboard"
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref DashboardTG

  ALBApiRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /api/*
            - /ws/*
            - /docs
            - /healthz
            - /readyz
      Actions:
        - Type: forward
          TargetGroupArn: !Ref OrchestratorTG

  # ---------------------------------------------------------------------------
  # IAM — ECS Task Execution Role
  # ---------------------------------------------------------------------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackName}-ecs-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SSMAndLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackName}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EFSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:ClientRootAccess
                Resource: !GetAtt EFSFileSystem.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch Log Groups
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackName}"
      RetentionInDays: 14

  # ---------------------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref StackName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  # ---------------------------------------------------------------------------
  # Orchestrator Task + Service
  # ---------------------------------------------------------------------------
  OrchestratorTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackName}-orchestrator"
      Cpu: !Ref OrchestratorCpu
      Memory: !Ref OrchestratorMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: orchestrator
          Image: !Sub "${EcrRegistry}/apf-orchestrator:${ImageTag}"
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: REDIS_URL
              Value: !Sub "redis://${RedisCluster.RedisEndpoint.Address}:6379/0"
            - Name: LLM_PROVIDER
              Value: anthropic
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/DATABASE_URL"
            - Name: APF_SECRET_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/APF_SECRET_KEY"
            - Name: APF_ADMIN_PASSWORD
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/APF_ADMIN_PASSWORD"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/ANTHROPIC_API_KEY"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/OPENAI_API_KEY"
            - Name: GITHUB_APP_ID
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/GITHUB_APP_ID"
            - Name: GITHUB_APP_PRIVATE_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/GITHUB_APP_PRIVATE_KEY"
            - Name: GITHUB_WEBHOOK_SECRET
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/GITHUB_WEBHOOK_SECRET"
            - Name: GITHUB_DEFAULT_REPO
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/GITHUB_DEFAULT_REPO"
            - Name: SLACK_BOT_TOKEN
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/SLACK_BOT_TOKEN"
            - Name: SLACK_SIGNING_SECRET
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/SLACK_SIGNING_SECRET"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: orchestrator

  OrchestratorService:
    Type: AWS::ECS::Service
    DependsOn: ALBApiRule
    Properties:
      ServiceName: !Sub "${StackName}-orchestrator"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref OrchestratorTaskDef
      DesiredCount: !Ref DesiredOrchestratorCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref AppSG
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
      LoadBalancers:
        - ContainerName: orchestrator
          ContainerPort: 8000
          TargetGroupArn: !Ref OrchestratorTG
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200

  # ---------------------------------------------------------------------------
  # Agent-Runner Task + Service
  # ---------------------------------------------------------------------------
  AgentRunnerTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackName}-agent-runner"
      Cpu: !Ref AgentRunnerCpu
      Memory: !Ref AgentRunnerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: agent-runner
          Image: !Sub "${EcrRegistry}/apf-agent-runner:${ImageTag}"
          Environment:
            - Name: REDIS_URL
              Value: !Sub "redis://${RedisCluster.RedisEndpoint.Address}:6379/0"
            - Name: ARTIFACT_STORE_URL
              Value: !Sub "http://${StackName}-artifact-store.${StackName}.local:8001"
            - Name: ORCHESTRATOR_URL
              Value: !Sub "http://${StackName}-orchestrator.${StackName}.local:8000"
            - Name: LLM_PROVIDER
              Value: anthropic
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/ANTHROPIC_API_KEY"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/OPENAI_API_KEY"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: agent-runner

  AgentRunnerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackName}-agent-runner"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AgentRunnerTaskDef
      DesiredCount: !Ref DesiredAgentRunnerCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref AppSG
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB

  # ---------------------------------------------------------------------------
  # Artifact-Store Task + Service
  # ---------------------------------------------------------------------------
  ArtifactStoreTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackName}-artifact-store"
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: artifacts
          EFSVolumeConfiguration:
            FilesystemId: !Ref EFSFileSystem
            RootDirectory: /artifacts
      ContainerDefinitions:
        - Name: artifact-store
          Image: !Sub "${EcrRegistry}/apf-artifact-store:${ImageTag}"
          PortMappings:
            - ContainerPort: 8001
          Environment:
            - Name: ARTIFACT_BACKEND
              Value: local
            - Name: LOCAL_STORAGE_PATH
              Value: /data/artifacts
          MountPoints:
            - SourceVolume: artifacts
              ContainerPath: /data/artifacts
          Secrets:
            - Name: APF_SECRET_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/APF_SECRET_KEY"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: artifact-store

  ArtifactStoreTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${StackName}-artifact-store"
      Protocol: HTTP
      Port: 8001
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /healthz

  ArtifactStoreService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackName}-artifact-store"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ArtifactStoreTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref AppSG
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB

  # ---------------------------------------------------------------------------
  # Dashboard Task + Service
  # ---------------------------------------------------------------------------
  DashboardTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackName}-dashboard"
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: dashboard
          Image: !Sub "${EcrRegistry}/apf-dashboard:${ImageTag}"
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: dashboard

  DashboardService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub "${StackName}-dashboard"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref DashboardTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref AppSG
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
      LoadBalancers:
        - ContainerName: dashboard
          ContainerPort: 80
          TargetGroupArn: !Ref DashboardTG

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  LoadBalancerDNS:
    Description: Public URL for the APF dashboard and API
    Value: !Sub "http://${ALB.DNSName}"
    Export:
      Name: !Sub "${StackName}-alb-dns"

  DashboardURL:
    Description: APF Dashboard
    Value: !Sub "http://${ALB.DNSName}"

  APIDocsURL:
    Description: OpenAPI docs (Swagger UI)
    Value: !Sub "http://${ALB.DNSName}/docs"

  ECSCluster:
    Description: ECS Cluster name
    Value: !Ref ECSCluster

  VpcId:
    Description: VPC ID
    Value: !Ref VPC
