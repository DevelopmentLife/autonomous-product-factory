# Alembic configuration file for APF db package.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file.
script_location = apf_db/migrations

# Template used to generate new migration file names.
# Default: %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# Sys.path prepend — allows import of apf_db without installing it.
prepend_sys_path = .

# Timezone for "Create Date" timestamp in migration files.
timezone = UTC

# Maximum length of the "slug" portion of generated file names.
truncate_slug_length = 40

# Set to "true" to run the environment during the "revision" command,
# even when we do not have access to the target DB.
revision_environment = false

# Set to "true" to allow .pyc / .pyo files in the versions directory.
sourceless = false

# Version path separator — use "os" (OS default), ":" (POSIX) or ";" (Windows).
version_path_separator = os

# Database URL — override with DATABASE_URL environment variable at runtime.
# For local dev / CI, point to a local SQLite file:
sqlalchemy.url = sqlite+aiosqlite:///./apf_dev.db


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
