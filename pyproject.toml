[tool.uv.workspace]
members = [
  "packages/agent-core",
  "packages/db",
  "packages/event-bus",
  "services/orchestrator",
  "services/agent-runner",
  "services/artifact-store",
  "services/github-integration",
  "services/slack-connector",
  "services/jira-connector",
  "services/confluence-connector",
  "services/aws-connector",
  "cli",
]

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages", "services", "cli"]
addopts = "--cov --cov-report=term-missing --cov-fail-under=80"
